name: Binder Readiness

on:
  pull_request:
    paths:
      - ".binder/**"
      - "scripts/ci/binder-launch-smoke.py"
      - ".github/workflows/binder-readiness.yml"
      - "docs/architecture/binder-notebook-execution.md"
  push:
    branches:
      - main
    paths:
      - ".binder/**"
      - "scripts/ci/binder-launch-smoke.py"
      - ".github/workflows/binder-readiness.yml"
      - "docs/architecture/binder-notebook-execution.md"
  schedule:
    - cron: "25 3 * * *"
  workflow_dispatch:
    inputs:
      run_launch_smoke:
        description: "Run mybinder launch smoke check"
        required: false
        default: true
        type: boolean
      launch_repo:
        description: "Binder launch target repo (owner/name)"
        required: false
        default: "LuHoo/workbooks"
        type: string
      launch_ref:
        description: "Binder launch target ref"
        required: false
        default: "main"
        type: string
      launch_urlpath:
        description: "Binder urlpath to validate"
        required: false
        default: "lab"
        type: string
      launch_timeout_seconds:
        description: "Binder build timeout for launch smoke"
        required: false
        default: "2400"
        type: string

permissions:
  contents: read

jobs:
  repo2docker-smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install repo2docker
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter-repo2docker

      - name: Run repo2docker build smoke check
        run: |
          mkdir -p generated/traceability
          timeout 1500 jupyter-repo2docker \
            --no-run \
            --debug \
            --image-name ada-binder-smoke:${{ github.sha }} \
            . 2>&1 | tee generated/traceability/binder-repo2docker-smoke.log

      - name: Upload repo2docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: binder-repo2docker-logs
          path: generated/traceability/binder-repo2docker-smoke.log

  binder-launch-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_launch_smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      BINDER_DEFAULT_REPO: LuHoo/workbooks
      BINDER_DEFAULT_REF: main
      BINDER_DEFAULT_URLPATH: lab
      BINDER_DEFAULT_TIMEOUT_SECONDS: "2400"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install launch smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Resolve launch target configuration
        id: config
        run: |
          REPO="${{ inputs.launch_repo }}"
          REF="${{ inputs.launch_ref }}"
          URLPATH="${{ inputs.launch_urlpath }}"
          TIMEOUT="${{ inputs.launch_timeout_seconds }}"

          if [ -z "$REPO" ]; then REPO="$BINDER_DEFAULT_REPO"; fi
          if [ -z "$REF" ]; then REF="$BINDER_DEFAULT_REF"; fi
          if [ -z "$URLPATH" ]; then URLPATH="$BINDER_DEFAULT_URLPATH"; fi
          if [ -z "$TIMEOUT" ]; then TIMEOUT="$BINDER_DEFAULT_TIMEOUT_SECONDS"; fi

          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "urlpath=$URLPATH" >> "$GITHUB_OUTPUT"
          echo "timeout=$TIMEOUT" >> "$GITHUB_OUTPUT"

      - name: Run mybinder launch smoke check
        run: |
          mkdir -p generated/traceability
          python3 scripts/ci/binder-launch-smoke.py \
            --target-repo "${{ steps.config.outputs.repo }}" \
            --target-ref "${{ steps.config.outputs.ref }}" \
            --urlpath "${{ steps.config.outputs.urlpath }}" \
            --build-timeout-seconds "${{ steps.config.outputs.timeout }}" \
            --log-file generated/traceability/binder-launch-smoke.log

      - name: Upload Binder launch logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: binder-launch-logs
          path: generated/traceability/binder-launch-smoke.log
