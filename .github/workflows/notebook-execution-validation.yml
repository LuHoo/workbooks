name: Notebook Execution Validation

on:
  push:
    branches:
      - main
    paths:
      - "notebooks/support/**/support.Rmd"
      - "notebooks/workshops/**"
      - "scripts/export-python-notebooks.R"
      - "scripts/workshop-ir-*.R"
      - "scripts/workshop-ir-*.py"
      - "scripts/ci/**"
      - "scripts/traceability-*.R"
      - "ada_fsaudit_bridge/**"
      - "metadata/traceability/**"
      - ".binder/**"
      - ".github/workflows/shared-notebook-validation.yml"
      - ".github/workflows/notebook-execution-validation.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "notebooks/support/**/support.Rmd"
      - "notebooks/workshops/**"
      - "scripts/export-python-notebooks.R"
      - "scripts/workshop-ir-*.R"
      - "scripts/workshop-ir-*.py"
      - "scripts/ci/**"
      - "scripts/traceability-*.R"
      - "ada_fsaudit_bridge/**"
      - "metadata/traceability/**"
      - ".binder/**"
      - ".github/workflows/shared-notebook-validation.yml"
      - ".github/workflows/notebook-execution-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: notebook-exec-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notebook-execution-validation:
    uses: ./.github/workflows/shared-notebook-validation.yml
    with:
      input-dir: generated/python-notebooks
      artifacts-dir: generated/notebook-execution-artifacts
      timeout-seconds: "600"
      published-dir: notebooks/workshops
      run-parity-traceability: true
      upload-parity-reports: true
