name: Export workshop notebooks

on:
  push:
    branches: [main]
    paths:
      - ".binder/**"
      - "notebooks/workshops"
      - ".gitmodules"
      - "notebooks/support/**/support.Rmd"
      - "scripts/export-workshops.R"
      - "scripts/export-python-notebooks.R"
      - "scripts/publish-python-notebooks.R"
      - "scripts/ci/check-binder-config-drift.sh"
      - "metadata/workshop-registry.R"
      - "scripts/notebook-manifest.R"
      - "scripts/workshop-export-config.R"
      - "scripts/workshop-ir.R"
      - "scripts/workshop-ir-validate.R"
      - "scripts/workshop-ir-python-renderer.py"
      - "scripts/ci/run-common-notebook-validations.sh"
      - ".github/workflows/shared-notebook-validation.yml"
      - ".github/workflows/export-workshops.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: export-workshops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notebook-execution-validation:
    uses: ./.github/workflows/shared-notebook-validation.yml
    with:
      input-dir: generated/python-notebooks
      artifacts-dir: generated/notebook-execution-artifacts
      timeout-seconds: "600"

  export:
    runs-on: ubuntu-latest
    needs: notebook-execution-validation
    permissions:
      contents: write

    steps:
      - name: Checkout ada
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.WORKBOOKS_PUSH_TOKEN }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install R export dependencies
        run: |
          Rscript -e "install.packages('jsonlite', repos='https://cloud.r-project.org')"

      - name: Export workshops
        run: |
          Rscript scripts/export-workshops.R
          Rscript scripts/export-python-notebooks.R --output-dir generated/python-notebooks

      - name: Validate Python notebook hygiene before publication
        run: |
          python3 scripts/ci/check-generated-python-notebooks.py \
            --input-dir generated/python-notebooks \
            --checks hygiene

      - name: Publish Python notebooks to workbooks target
        run: |
          Rscript scripts/publish-python-notebooks.R --input-dir generated/python-notebooks --output-dir notebooks/workshops

      - name: Sync authoritative Binder config into workbooks mirror
        run: |
          mkdir -p notebooks/workshops/.binder
          cp .binder/runtime.txt notebooks/workshops/.binder/runtime.txt
          cp .binder/install.R notebooks/workshops/.binder/install.R
          cp .binder/requirements.txt notebooks/workshops/.binder/requirements.txt
          cp .binder/postBuild notebooks/workshops/.binder/postBuild
          cp .binder/apt.txt notebooks/workshops/.binder/apt.txt

      - name: Verify Binder mirror after sync
        run: |
          bash scripts/ci/check-binder-config-drift.sh

      - name: Verify published notebooks follow generated artifact policy
        run: |
          python3 scripts/ci/check-generated-python-notebooks.py \
            --input-dir generated/python-notebooks \
            --checks hygiene \
            --published-dir notebooks/workshops

      - name: Commit and publish workbooks target
        run: |
          git submodule foreach 'git status --short'

          cd notebooks/workshops
          git add .
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Update generated workbooks from ada"
            git push origin HEAD:main
          else
            echo "No changes in workbooks."
          fi

          cd ../..
          if ! git diff --quiet notebooks/workshops; then
            git add notebooks/workshops
            git commit -m "Update workbooks submodule"
            git push
          else
            echo "No submodule pointer change."
          fi