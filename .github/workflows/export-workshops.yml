name: Export workshop notebooks

on:
  push:
    branches: [main]
    paths:
      - "notebooks/support/**/support.Rmd"
      - "scripts/export-workshops.R"
      - "scripts/export-python-notebooks.R"
      - "scripts/publish-python-notebooks.R"
      - "scripts/notebook-manifest.R"
      - "scripts/workshop-export-config.R"
      - "scripts/workshop-ir.R"
      - "scripts/workshop-ir-validate.R"
      - "scripts/workshop-ir-python-renderer.py"
      - ".github/workflows/export-workshops.yml"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: export-workshops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight-fast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.1"

      - name: Install minimal R test dependencies
        run: |
          Rscript -e "install.packages('jsonlite', repos='https://cloud.r-project.org')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .binder/requirements.txt

      - name: Renderer regression tests
        run: |
          python3 tests/python-renderer/run-tests.py

  notebook-execution-validation:
    needs: preflight-fast
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.10"
      R_VERSION: "4.3.1"
      FSAUDIT_REF: "5a36801a712d9d736bb2c5a3992e7b8b644c7418"
      AICPA_REF: "4a49d0357544eb22ed3314005af2f82b3cf0f53a"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system libraries for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libuv1-dev

      - name: Install R dependencies
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e "install.packages(c('IRkernel','jsonlite','knitr','rmarkdown','remotes','devtools','readr','ggplot2','car','gridExtra','tidyr','corrplot','lmtest','latex2exp','scales'), repos='https://cloud.r-project.org')"
          Rscript -e "remotes::install_github(sprintf('LuHoo/FSaudit@%s', Sys.getenv('FSAUDIT_REF')), upgrade = 'never', dependencies = TRUE, auth_token = Sys.getenv('GITHUB_PAT'))"
          Rscript -e "remotes::install_github(sprintf('LuHoo/aicpa@%s', Sys.getenv('AICPA_REF')), upgrade = 'never', dependencies = TRUE, auth_token = Sys.getenv('GITHUB_PAT'))"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .binder/requirements.txt

      - name: Print runtime diagnostics
        run: |
          python --version
          python - <<'PY'
          import importlib.metadata
          print('rpy2', importlib.metadata.version('rpy2'))
          PY
          R --version | head -n 1
          Rscript -e "cat('FSaudit', as.character(packageVersion('FSaudit')), '\n')"

      - name: Generate Python notebooks
        run: |
          Rscript scripts/export-python-notebooks.R --output-dir generated/python-notebooks

      - name: Enforce strict Python output guardrail
        run: |
          python3 scripts/ci/check-generated-python-notebooks.py \
            --input-dir generated/python-notebooks

      - name: "Assert R/Python equivalence (phase 1: chapter 1 and 6)"
        run: |
          python3 scripts/ci/assert-r-python-equivalence.py \
            --chapters 1,6

      - name: "Assert R/Python equivalence (phase 2: all supported chapters)"
        run: |
          python3 scripts/ci/assert-r-python-equivalence.py \
            --chapters 1,2,3,4,5,6

      - name: Execute representative R workshops
        run: |
          Rscript scripts/ci/execute-r-workshop-smoke.R

      - name: Execute generated Python notebooks
        run: |
          python3 scripts/ci/execute-generated-python-notebooks.py \
            --input-dir generated/python-notebooks \
            --artifacts-dir generated/notebook-execution-artifacts \
            --timeout 600

      - name: Upload notebook execution artifacts
        if: ${{ always() && hashFiles('generated/notebook-execution-artifacts/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: notebook-execution-artifacts
          path: generated/notebook-execution-artifacts

  export:
    runs-on: ubuntu-latest
    needs: notebook-execution-validation

    steps:
      - name: Checkout ada
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.WORKBOOKS_PUSH_TOKEN }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install R export dependencies
        run: |
          Rscript -e "install.packages('jsonlite', repos='https://cloud.r-project.org')"

      - name: Export workshops
        run: |
          Rscript scripts/export-workshops.R
          Rscript scripts/export-python-notebooks.R --output-dir generated/python-notebooks

      - name: Validate Python notebook hygiene before publication
        run: |
          python3 scripts/ci/check-generated-python-notebooks.py \
            --input-dir generated/python-notebooks \
            --checks hygiene

      - name: Publish Python notebooks
        run: |
          Rscript scripts/publish-python-notebooks.R --input-dir generated/python-notebooks --output-dir notebooks/workshops

      - name: Commit and publish workbooks
        run: |
          git submodule foreach 'git status --short'

          cd notebooks/workshops
          git add .
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Update generated workbooks from ada"
            git push origin HEAD:main
          else
            echo "No changes in workbooks."
          fi

          cd ../..
          if ! git diff --quiet notebooks/workshops; then
            git add notebooks/workshops
            git commit -m "Update workbooks submodule"
            git push
          else
            echo "No submodule pointer change."
          fi