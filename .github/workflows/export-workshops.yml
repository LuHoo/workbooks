name: Export workshop notebooks

on:
  push:
    branches: [main]
    paths:
      - "notebooks/support/**/support.Rmd"
      - "scripts/export-workshops.R"
      - "scripts/notebook-manifest.R"
      - ".github/workflows/export-workshops.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ada
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.WORKBOOKS_PUSH_TOKEN }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Export workshops
        run: Rscript scripts/export-workshops.R

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git submodule foreach 'git status --short'

          cd notebooks/workshops
          if ! git diff --quiet; then
            git add .
            git commit -m "Update generated workbooks from ada"
            git push origin HEAD:main
          else
            echo "No changes in workbooks."
          fi

          cd ../..
          if ! git diff --quiet notebooks/workshops; then
            git add notebooks/workshops
            git commit -m "Update workbooks submodule"
            git push
          else
            echo "No submodule pointer change."
          fi