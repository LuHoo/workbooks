name: Export workshop notebooks

on:
  push:
    branches: [main]
    paths:
      - "notebooks/support/**/support.Rmd"
      - "scripts/export-workshops.R"
      - "scripts/notebook-manifest.R"
      - ".github/workflows/export-workshops.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ada
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.WORKBOOKS_PUSH_TOKEN }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Export workshops
        run: Rscript scripts/export-workshops.R

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"